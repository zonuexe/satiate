name: PHP setup
description: Set up PHP + Composer, cache downloads, and install dependencies (root + bamarni bins).

inputs:
  php-version:
    description: PHP version to set up.
    default: '8.5'
  coverage:
    description: Coverage driver to enable (none, pcov, xdebug).
    default: none

runs:
  using: composite
  steps:
    - uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ inputs.php-version }}
        tools: composer:v2
        coverage: ${{ inputs.coverage }}

    - name: Resolve Composer cache directory
      id: composer-cache
      shell: bash
      run: echo "dir=$(composer config --global cache-dir)" >> "$GITHUB_OUTPUT"

    - name: Cache Composer downloads
      uses: actions/cache@v5
      with:
        path: ${{ steps.composer-cache.outputs.dir }}
        key: composer-${{ runner.os }}-php${{ inputs.php-version }}-${{ hashFiles('composer.lock', '.vendor-bin/*/composer.lock') }}
        restore-keys: |
          composer-${{ runner.os }}-php${{ inputs.php-version }}-
          composer-${{ runner.os }}-

    # bamarni's forward-command makes a single `composer install` also install every
    # .vendor-bin/* tool (phpstan, easycs, phpunit, infection), so no separate bin steps are needed.
    - name: Install dependencies
      shell: bash
      run: composer install --no-interaction --no-progress
