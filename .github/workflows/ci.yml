name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: PHPStan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/php-setup
      - run: composer phpstan analyse src/ tests/

  cs:
    name: ECS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/php-setup
      - run: composer ecs check src/ tests/ bin/

  test:
    name: PHPUnit (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.5']
        # Forward-looking, non-blocking: surfaces breakage on the upcoming PHP before it ships.
        include:
          - php: nightly
            experimental: true
    continue-on-error: ${{ matrix.experimental || false }}
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/php-setup
        with:
          php-version: ${{ matrix.php }}
      - run: composer phpunit

  dogfood:
    name: Dogfood E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/php-setup
      - run: ./bin/dogfood-test

  # Single required status check for branch protection: green only when every blocking job passed.
  # The nightly PHP matrix entry is continue-on-error, so it does not affect this gate.
  ci-success:
    name: CI success
    runs-on: ubuntu-latest
    needs: [lint, cs, test, dogfood]
    if: always()
    steps:
      - name: Verify every job succeeded
        run: |
          results='${{ join(needs.*.result, ' ') }}'
          echo "Job results: ${results}"
          for r in ${results}; do
            if [ "${r}" != "success" ]; then
              echo "::error::A required CI job did not succeed (${r})."
              exit 1
            fi
          done
          echo "All CI jobs passed."
